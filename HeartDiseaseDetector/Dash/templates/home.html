<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Heart Disease Detector</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            margin: 0;
            padding: 0;
            color: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: #020617;
            padding: 2.5rem 3rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 60px rgba(15,23,42,0.75);
            max-width: 520px;
            text-align: center;
            border: 1px solid rgba(148, 163, 184, 0.4);
        }
        h1 {
            margin-top: 0;
            margin-bottom: 0.75rem;
            font-size: 2.1rem;
            letter-spacing: 0.03em;
        }
        p {
            margin: 0.25rem 0;
            color: #9ca3af;
        }
        .badge {
            display: inline-block;
            padding: 0.25rem 0.6rem;
            border-radius: 999px;
            border: 1px solid rgba(248, 250, 252, 0.18);
            font-size: 0.75rem;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #e5e7eb;
        }
        .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 1.75rem;
            padding: 0.9rem 1.8rem;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            background: linear-gradient(135deg, #ec4899, #ef4444);
            color: #f9fafb;
            text-decoration: none;
            box-shadow: 0 12px 30px rgba(248, 113, 113, 0.55);
            transition: transform 0.08s ease-out, box-shadow 0.08s ease-out, filter 0.15s ease-out;
        }
        .cta-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 40px rgba(248, 113, 113, 0.7);
            filter: brightness(1.05);
        }
        .cta-button:active {
            transform: translateY(0);
            box-shadow: 0 10px 25px rgba(248, 113, 113, 0.5);
        }
        .cta-button span {
            margin-left: 0.4rem;
            font-size: 1.1rem;
        }
        .footer {
            margin-top: 1.75rem;
            font-size: 0.75rem;
            color: #6b7280;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="badge">SVM • Clinical Risk Scoring</div>
    <h1>Heart Disease Detector</h1>
    <p>Interactive web demo using a Support Vector Machine trained on the</p>
    <p><strong>UCI Heart Disease</strong> dataset.</p>

    <a href="{% url 'predict' %}" class="cta-button">
        Start Prediction
        <span>→</span>
    </a>

    <div class="footer">
        Enter clinical features to estimate the risk of heart disease.<br>
        This tool is for educational purposes only.
    </div>
</div>
</body>
</html>
