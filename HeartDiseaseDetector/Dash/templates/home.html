<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Heart Disease Detector</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
            color: #111827;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: #ffffff;
            padding: 2rem 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
            max-width: 520px;
            text-align: center;
            border: 1px solid #e5e7eb;
        }
        h1 {
            margin-top: 0;
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }
        p {
            margin: 0.2rem 0;
            color: #4b5563;
        }
        .badge {
            display: inline-block;
            padding: 0.25rem 0.7rem;
            border-radius: 999px;
            border: 1px solid #d1d5db;
            font-size: 0.75rem;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
            background: #f9fafb;
        }
        .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 1.5rem;
            padding: 0.75rem 1.6rem;
            border-radius: 999px;
            border: 1px solid #2563eb;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            background: #2563eb;
            color: #ffffff;
            text-decoration: none;
        }
        .cta-button:hover {
            background: #1d4ed8;
            border-color: #1d4ed8;
        }
        .cta-button span {
            margin-left: 0.35rem;
            font-size: 1.1rem;
        }
        .footer {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #6b7280;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="badge">SVM • Clinical Risk Scoring</div>
    <h1>Heart Disease Detector</h1>
    <p>Interactive web demo using a Support Vector Machine trained on the</p>
    <p><strong>UCI Heart Disease</strong> dataset.</p>

    <a href="{% url 'predict' %}" class="cta-button">
        Start Prediction
        <span>→</span>
    </a>

    <div class="footer">
        Enter clinical features to estimate the risk of heart disease.<br>
        This tool is for educational purposes only.
    </div>
</div>
</body>
</html>
